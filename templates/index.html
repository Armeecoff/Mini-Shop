<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Pro 3.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0b0f19;
            --card: #151f32;
            --text: #f3f4f6;
            --accent: #deff9a;
            --accent-purple: #a855f7;
            --border: rgba(255, 255, 255, 0.06);
        }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 15px; padding-bottom: 40px;
        }
        .nav-bar {
            display: flex; gap: 8px; overflow-x: auto; margin-bottom: 20px;
        }
        .nav-btn {
            flex: 1; padding: 12px; background: var(--card); border: 1px solid var(--border);
            color: #9ca3af; border-radius: 10px; font-weight: bold; cursor: pointer; white-space: nowrap;
        }
        .nav-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        
        .card {
            background: var(--card); border-radius: 14px; padding: 15px; 
            margin-bottom: 15px; border: 1px solid var(--border);
        }
        .prod-media { width: 100%; height: 160px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; }
        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
        
        .btn {
            padding: 12px; border: none; border-radius: 8px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-stars { background: linear-gradient(135deg, #f59e0b, #b45309); color: white; }
        .btn-yoo { background: linear-gradient(135deg, var(--accent-purple), #6b21a8); color: white; }
        .btn-bal { background: #3b82f6; color: white; width: 100%; margin-top: 6px; }
        .btn-save { background: var(--accent); color: #000; width: 100%; }
        
        input, textarea, select {
            width: 100%; padding: 12px; background: #1e293b; border: 1px solid #334155;
            color: #fff; border-radius: 8px; margin-bottom: 12px; box-sizing: border-box;
        }
        .badge {
            display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold;
        }
        .badge-paid { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .badge-pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button class="nav-btn active" onclick="switchTab('shop')">🛒 Витрина</button>
        <button class="nav-btn" onclick="switchTab('profile')">👤 Профиль</button>
        <button class="nav-btn hidden" id="adm-tab-btn" onclick="switchTab('admin')">🛡️ Админка</button>
    </div>

    <div id="tab-shop">
        {% for p in products %}
        <div class="card">
            {% if p.media %}
                <img src="{{ p.media }}" class="prod-media">
            {% endif %}
            <div style="font-size: 18px; font-weight: bold;">{{ p.title }}</div>
            <div style="font-size: 14px; color: #9ca3af; margin-top: 6px;">{{ p.desc }}</div>
            
            <div class="price-grid">
                <button class="btn btn-stars" onclick="triggerPayment('{{p.id}}', 'stars')">⭐ {{ p.stars }} Stars</button>
                <button class="btn btn-yoo" onclick="triggerPayment('{{p.id}}', 'yoomoney')">💳 ЮMoney ({{ p.rub }}₽)</button>
            </div>
            <button class="btn btn-bal" onclick="triggerPayment('{{p.id}}', 'balance')">👛 Купить с баланса ({{ p.rub }}₽)</button>
            <button class="btn hidden admin-only" style="background:#475569; color:#fff; width:100%; margin-top:6px;" onclick="loadEditProduct({{ p | tojson }})">✏️ Редактировать</button>
        </div>
        {% endfor %}
    </div>

    <div id="tab-profile" class="hidden">
        <div class="card" style="text-align: center;">
            <div style="color: #9ca3af; font-size: 14px;">Ваш внутренний баланс</div>
            <div id="prof-balance" style="font-size: 36px; font-weight: bold; color: var(--accent); margin: 8px 0;">0 ₽</div>
            <div style="font-size: 11px; color: #6b7280;">ID аккаунта: <span id="prof-id">0</span></div>
        </div>
        <h3>История ваших заказов</h3>
        <div id="history-box"></div>
    </div>

    <div id="tab-admin" class="hidden">
        <div class="card">
            <h3 style="margin-top:0;">Выдача / Корректировка баланса</h3>
            <input type="number" id="adm-user-id" placeholder="ID пользователя в Telegram">
            <input type="number" id="adm-amount" placeholder="Сумма (например, 500 или -200)">
            <button class="btn btn-save" onclick="adjustBalance()">⚡ Применить баланс</button>
        </div>

        <div class="card">
            <h3 id="form-header" style="margin-top:0;">Добавить товар</h3>
            <form id="product-form">
                <input type="hidden" id="form-prod-id" value="new">
                <input type="text" id="form-title" placeholder="Название товара" required>
                <input type="number" id="form-stars" placeholder="Цена в Stars" required>
                <input type="number" id="form-rub" placeholder="Цена в Рублях" required>
                <textarea id="form-desc" placeholder="Описание товара" rows="3" required></textarea>
                <textarea id="form-data" placeholder="Данные автовыдачи (ключи, файлы)" rows="2"></textarea>
                <input type="url" id="form-media" placeholder="Ссылка на картинку карточки (URL)">
                <button type="button" class="btn btn-save" onclick="submitProductForm()">💾 Сохранить в каталог</button>
                <button type="button" class="btn hidden" id="btn-cancel" style="background:#4b5563; color:#fff; width:100%; margin-top:6px;" onclick="clearForm()">Отмена</button>
            </form>
        </div>

        <h3>Последние действия (Аудит)</h3>
        <div id="adm-tx-log"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const user = tg.initDataUnsafe.user || { id: 0, username: "local_dev" };
        const ADMIN_ID = {{ admin_id }};

        if (user.id === ADMIN_ID || user.id === 0) {
            document.getElementById("adm-tab-btn").classList.remove("hidden");
            document.querySelectorAll(".admin-only").forEach(el => el.classList.remove("hidden"));
        }

        function switchTab(name) {
            document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
            event.target.classList.add("active");
            
            ['shop', 'profile', 'admin'].forEach(t => document.getElementById('tab-'+t).classList.add('hidden'));
            document.getElementById('tab-'+name).classList.remove('hidden');

            if (name === 'profile') fetchProfile();
            if (name === 'admin') fetchAdminDashboard();
        }

        async function fetchProfile() {
            document.getElementById("prof-id").innerText = user.id;
            let r = await fetch('/api/profile/' + user.id);
            let d = await r.json();
            document.getElementById("prof-balance").innerText = d.balance + " ₽";
            
            document.getElementById("history-box").innerHTML = d.history.map(h => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${h.title || 'Пополнение'}</b>
                        <span class="badge ${h.status==='paid'?'badge-paid':'badge-pending'}">${h.status.toUpperCase()}</span>
                    </div>
                    <div style="font-size:12px; color:#9ca3af; margin-top:6px;">
                        Тип: ${h.type.toUpperCase()} | Сумма: ${h.amount} | Дата: ${h.date}
                    </div>
                    ${h.charge_id ? `<div style="font-size:10px; color:#6b7280; font-family:monospace; margin-top:4px;">TX: ${h.charge_id}</div>` : ''}
                </div>
            `).join('') || '<p style="color:#6b7280;">История покупок пуста</p>';
        }

        async function fetchAdminDashboard() {
            let r = await fetch('/api/admin/data');
            let d = await r.json();
            document.getElementById("adm-tx-log").innerHTML = d.transactions.map(t => `
                <div class="card" style="font-size:13px;">
                    <b>Заказ #${t.id}</b> от @${t.username}<br>
                    Товар: ${t.title || 'Внешнее изменение'}<br>
                    Шлюз: ${t.type.toUpperCase()} | Статус: <span style="color:${t.status==='paid'?'#10b981':'#f59e0b'}">${t.status}</span><br>
                    ${t.charge_id ? `<code>ID: ${t.charge_id}</code>` : ''}
                </div>
            `).join('');
        }

        async function triggerPayment(prodId, type) {
            if (type === 'yoomoney') {
                window.open("https://yoomoney.ru/fundraise/1HSLJ8JGS6P.260520", "_blank");
                tg.showPopup({
                    title: '💳 Оплата ЮMoney',
                    message: 'Переведите сумму на кошелек. После успешного списания нажмите кнопку ниже для отправки чека админу.',
                    buttons: [{id: 'paid', type: 'default', text: '✅ Я оплатил'}, {type: 'cancel', text: 'Отмена'}]
                }, function(btn) {
                    if (btn === 'paid') executePurchaseRequest(prodId, 'yoomoney');
                });
            } else {
                executePurchaseRequest(prodId, type);
            }
        }

        async function executePurchaseRequest(prodId, type) {
            let res = await fetch("/api/buy", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ user_id: user.id, username: user.username, product_id: prodId, type: type })
            });
            let d = await res.json();
            if (d.error) { tg.showAlert("Ошибка: " + d.error); }
            else if (d.status === "invoice_sent") { tg.close(); }
            else { tg.showAlert("Успешно обработано! Проверьте статус в профиле или диалоге с ботом."); }
        }

        function loadEditProduct(p) {
            switchTab('admin');
            document.getElementById("form-header").innerText = "Редактировать: " + p.title;
            document.getElementById("form-prod-id").value = p.id;
            document.getElementById("form-title").value = p.title;
            document.getElementById("form-stars").value = p.stars;
            document.getElementById("form-rub").value = p.rub;
            document.getElementById("form-desc").value = p.desc;
            document.getElementById("form-data").value = p.data || "";
            document.getElementById("form-media").value = p.media || "";
            document.getElementById("btn-cancel").classList.remove("hidden");
        }

        function clearForm() {
            document.getElementById("form-header").innerText = "Добавить товар";
            document.getElementById("product-form").reset();
            document.getElementById("form-prod-id").value = "new";
            document.getElementById("btn-cancel").classList.add("hidden");
        }

        async function submitProductForm() {
            let fd = new FormData();
            fd.append("id", document.getElementById("form-prod-id").value);
            fd.append("title", document.getElementById("form-title").value);
            fd.append("price_stars", document.getElementById("form-stars").value);
            fd.append("price_rub", document.getElementById("form-rub").value);
            fd.append("description", document.getElementById("form-desc").value);
            fd.append("auto_data", document.getElementById("form-data").value);
            fd.append("media_url", document.getElementById("form-media").value);

            await fetch("/api/admin/save-product", { method: "POST", body: fd });
            clearForm();
            location.reload();
        }

        async function adjustBalance() {
            let fd = new FormData();
            fd.append("user_id", document.getElementById("adm-user-id").value);
            fd.append("amount", document.getElementById("adm-amount").value);
            let r = await fetch("/api/admin/change-balance", { method: "POST", body: fd });
            if (r.ok) { tg.showAlert("Баланс обновлен!"); fetchAdminDashboard(); }
        }
    </script>
</body>
</html>
