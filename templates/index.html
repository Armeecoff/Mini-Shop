<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberStars Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #111827;
            --card-bg: #1f2937;
            --text-color: #f3f4f6;
            --accent-color: #3b82f6;
            --accent-green: #10b981;
            --accent-purple: #8b5cf6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 15px;
            padding-bottom: 80px;
        }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 24px; margin: 0; color: #fff; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            background: var(--card-bg); color: #9ca3af; font-weight: bold; cursor: pointer;
        }
        .tab-btn.active { background: var(--accent-color); color: #fff; }
        
        .product-card {
            background: var(--card-bg); border-radius: 14px; overflow: hidden;
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05);
        }
        .product-img { width: 100%; height: 180px; object-fit: cover; background: #374151; }
        .product-info { padding: 15px; }
        .product-title { font-size: 18px; margin: 0 0 8px 0; color: #fff; }
        .product-desc { font-size: 14px; color: #9ca3af; margin-bottom: 15px; line-height: 1.4; }
        
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            color: white; font-weight: bold; cursor: pointer; margin-bottom: 8px;
            display: flex; justify-content: center; align-items: center; gap: 8px;
            font-size: 14px;
        }
        .btn-stars { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .btn-yoo { background: linear-gradient(135deg, var(--accent-purple), #6d28d9); }
        .btn-admin-edit { background: #4b5563; }
        
        /* Админ-форма */
        .admin-box { background: var(--card-bg); padding: 15px; border-radius: 12px; }
        input, textarea {
            width: 100%; padding: 12px; background: #374151; border: 1px solid #4b5563;
            color: white; border-radius: 8px; margin-bottom: 12px; box-sizing: border-box;
        }
        label { display: block; font-size: 12px; color: #9ca3af; margin-bottom: 4px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🌟 CyberStars Marketplace</h1>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="btn-shop-tab" onclick="switchTab('shop')">📇 Каталог</button>
        <button class="tab-btn hidden" id="btn-admin-tab" onclick="switchTab('admin')">🛠️ Админка (Новый)</button>
    </div>

    <div id="tab-shop">
        {% for p in products %}
        <div class="product-card">
            {% if p.media_url %}
                <img src="{{ p.media_url }}" class="product-img" alt="Media">
            {% endif %}
            <div class="product-info">
                <div class="product-title">{{ p.title }}</div>
                <div class="product-desc">{{ p.description }}</div>
                
                <button class="btn btn-stars" onclick="initPay('{{ p.id }}', 'stars')">
                    <span>Купить за ⭐ {{ p.price_stars }} Stars</span>
                </button>
                
                <button class="btn btn-yoo" onclick="initPay('{{ p.id }}', 'yoomoney')">
                    <span>💳 ЮMoney ({{ p.price_rub }} руб.)</span>
                </button>

                <button class="btn btn-admin-edit hidden admin-only-element" onclick="loadToEdit({{ p | tojson }})">
                    <span>📝 Редактировать товар</span>
                </button>
            </div>
        </div>
        {% endfor %}
    </div>

    <div id="tab-admin" class="hidden">
        <div class="admin-box">
            <h3 id="form-title" style="margin-top:0;">Добавить товар</h3>
            <form id="prod-form">
                <input type="hidden" id="prod-id" value="new">
                
                <label>Название</label>
                <input type="text" id="title" required placeholder="Например: Premium VPN на 1 месяц">
                
                <label>Цена в Stars (Telegram Звезды)</label>
                <input type="number" id="price_stars" required placeholder="100">
                
                <label>Цена в Рублях (для ЮMoney)</label>
                <input type="number" id="price_rub" required placeholder="350">
                
                <label>Описание товара</label>
                <textarea id="description" rows="3" required placeholder="Опишите преимущества..."></textarea>
                
                <label>Текст автовыдачи после оплаты (Ключ/Ссылка)</label>
                <textarea id="auto_data" rows="2" placeholder="Оставьте пустым для ручной связи"></textarea>
                
                <label>Ссылка на картинку/видео карточки (URL)</label>
                <input type="url" id="media_url" placeholder="https://site.com/image.png">
                
                <button type="button" class="btn" style="background: var(--accent-green);" onclick="saveProduct()">💾 Сохранить товар</button>
                <button type="button" class="btn hidden" id="btn-cancel-edit" style="background: #6b7280;" onclick="resetForm()">Отмена</button>
            </form>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Безопасно получаем данные юзера из ТГ
        const user = tg.initDataUnsafe.user || { id: 0, username: "local_test" };
        const ADMIN_ID = {{ admin_id }};

        // Если это админ — открываем ему скрытые разделы управления
        if (user.id === ADMIN_ID || user.id == 0) {
            document.getElementById("btn-admin-tab").classList.remove("hidden");
            document.querySelectorAll(".admin-only-element").forEach(el => el.classList.remove("hidden"));
        }

        function switchTab(tabName) {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            if (tabName === 'shop') {
                document.getElementById("btn-shop-tab").classList.add("active");
                document.getElementById("tab-shop").classList.remove("hidden");
                document.getElementById("tab-admin").classList.add("hidden");
            } else {
                document.getElementById("btn-admin-tab").classList.add("active");
                document.getElementById("tab-shop").classList.add("hidden");
                document.getElementById("tab-admin").classList.remove("hidden");
            }
        }

        async function initPay(productId, type) {
            if (type === 'yoomoney') {
                // Сначала отправляем юзера оплачивать по кнопке на твою форму ЮMoney
                window.open("https://yoomoney.ru/fundraise/1HSLJ8JGS6P.260520", "_blank");
                
                // Сразу же выводим ТГ-окно подтверждения, где есть кнопка "Я оплатил"
                tg.showPopup({
                    title: '💵 Оплата через ЮMoney',
                    message: 'Вы перенаправлены на форму оплаты. После того, как совершите перевод, нажмите кнопку «Я оплатил», чтобы админ проверил транзакцию.',
                    buttons: [
                        {id: 'paid', type: 'default', text: '✅ Я оплатил'},
                        {id: 'cancel', type: 'cancel', text: 'Отмена'}
                    ]
                }, async function(buttonId) {
                    if (buttonId === 'paid') {
                        sendPayload(productId, 'yoomoney');
                    }
                });
            } else {
                // Если Stars — просто кидаем запрос бэкенду, он вызовет нативный инвойс
                sendPayload(productId, 'stars');
            }
        }

        async function sendPayload(productId, type) {
            try {
                let response = await fetch("/api/buy", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        user_id: user.id,
                        username: user.username,
                        product_id: productId,
                        type: type
                    })
                });
                let res = await response.json();
                if (res.status === "invoice_sent") {
                    tg.close(); // Закрываем Mini App, шторка оплаты Stars вылезет поверх чата
                } else if (res.status === "yoomoney_submitted") {
                    tg.showAlert("Запрос отправлен! Админу пришло уведомление, ожидайте выдачи товара в чате бота.");
                }
            } catch (err) {
                tg.showAlert("Ошибка соединения: " + err);
            }
        }

        // Загрузка данных товара в форму для его изменения
        function loadToEdit(p) {
            switchTab('admin');
            document.getElementById("form-title").innerText = "Редактировать: " + p.title;
            document.getElementById("prod-id").value = p.id;
            document.getElementById("title").value = p.title;
            document.getElementById("price_stars").value = p.price_stars;
            document.getElementById("price_rub").value = p.price_rub;
            document.getElementById("description").value = p.description;
            document.getElementById("auto_data").value = p.auto_data || "";
            document.getElementById("media_url").value = p.media_url || "";
            document.getElementById("btn-cancel-edit").classList.remove("hidden");
        }

        function resetForm() {
            document.getElementById("form-title").innerText = "Добавить товар";
            document.getElementById("prod-form").reset();
            document.getElementById("prod-id").value = "new";
            document.getElementById("btn-cancel-edit").classList.add("hidden");
        }

        async function saveProduct() {
            let formData = new FormData();
            formData.append("id", document.getElementById("prod-id").value);
            formData.append("title", document.getElementById("title").value);
            formData.append("price_stars", document.getElementById("price_stars").value);
            formData.append("price_rub", document.getElementById("price_rub").value);
            formData.append("description", document.getElementById("description").value);
            formData.append("auto_data", document.getElementById("auto_data").value);
            formData.append("media_url", document.getElementById("media_url").value);

            let response = await fetch("/api/admin/save-product", { method: "POST", body: formData });
            let res = await response.json();
            if (res.status === "success") {
                resetForm();
                location.reload();
            }
        }
    </script>
</body>
</html>
