<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Stars Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 15px; margin: 0;
        }
        .tabs { display: flex; margin-bottom: 20px; gap: 10px; }
        .tab-btn {
            flex: 1; padding: 10px; border: none; border-radius: 8px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color); font-weight: bold; cursor: pointer;
        }
        .tab-btn.active { background: var(--tg-theme-button-color, #2481cc); color: white; }
        .product-card {
            background: var(--tg-theme-secondary-bg-color, #f4f4f5);
            padding: 15px; border-radius: 12px; margin-bottom: 15px;
        }
        .btn {
            width: 100%; padding: 10px; margin-top: 8px; border: none; border-radius: 8px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff); font-weight: bold; cursor: pointer;
        }
        .btn-ym { background-color: #8000ff; }
        input, textarea {
            width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.1); box-sizing: border-box;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('shop')">Магазин</button>
        <button id="admin-tab-btn" class="tab-btn hidden" onclick="switchTab('admin')">Админка</button>
    </div>

    <div id="tab-shop">
        <h2>Каталог товаров</h2>
        {% for p in products %}
        <div class="product-card">
            <h3>{{ p.title }}</h3>
            <p>{{ p.description }}</p>
            <button class="btn" onclick="buy('{{ p.id }}', 'stars')">Купить за ⭐ {{ p.price_stars }} Stars</button>
            <button class="btn btn-ym" onclick="buy('{{ p.id }}', 'yoomoney')">Купить через ЮMoney ({{ p.price_rub }} руб)</button>
        </div>
        {% endfor %}
    </div>

    <div id="tab-admin" class="hidden">
        <h2>Добавить новый товар</h2>
        <form id="add-product-form">
            <input type="text" id="title" placeholder="Название товара" required>
            <input type="number" id="price_stars" placeholder="Цена в Stars (ТГ Звезды)" required>
            <input type="number" id="price_rub" placeholder="Цена в Рублях (для ЮMoney)" required>
            <textarea id="description" placeholder="Описание товара" required></textarea>
            <textarea id="auto_data" placeholder="Текст для автовыдачи (опционально)"></textarea>
            <button type="button" class="btn" onclick="addProduct()">Создать товар</button>
        </form>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe.user || { id: 0, username: "test_user" };
        const ADMIN_ID = {{ admin_id }};

        // Если зашел админ — показываем кнопку админки
        if (user.id === ADMIN_ID || user.id == 123456) { // Замени 123456 на свой ID для тестов на локалке
            document.getElementById("admin-tab-btn").classList.remove("hidden");
        }

        function switchTab(tab) {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            if(tab === 'shop') {
                document.getElementById("tab-shop").classList.remove("hidden");
                document.getElementById("tab-admin").addClass ? {} : document.getElementById("tab-admin").classList.add("hidden");
                event.target.classList.add("active");
            } else {
                document.getElementById("tab-shop").classList.add("hidden");
                document.getElementById("tab-admin").classList.remove("hidden");
                event.target.classList.add("active");
            }
        }

        async function buy(productId, type) {
            if (type === 'yoomoney') {
                // Перенаправляем на форму ЮMoney
                window.open("https://yoomoney.ru/fundraise/1HSLJ8JGS6P.260520", "_blank");
            }

            let response = await fetch("/buy", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    user_id: user.id,
                    username: user.username,
                    product_id: productId,
                    type: type
                })
            });
            let result = await response.json();

            if (result.status === "invoice_sent") {
                tg.close(); // Закрываем окно, инвойс прилетит прямо в чат бота
            } else if (result.status === "yoomoney_pending") {
                tg.showPopup({
                    title: 'Заявка отправлена',
                    message: 'После оплаты в ЮMoney, админ проверит перевод и бот выдаст вам товар!',
                    buttons: [{type: 'ok'}]
                });
            }
        }

        async function addProduct() {
            let formData = new FormData();
            formData.append("title", document.getElementById("title").value);
            formData.append("price_stars", document.getElementById("price_stars").value);
            formData.append("price_rub", document.getElementById("price_rub").value);
            formData.append("description", document.getElementById("description").value);
            formData.append("auto_data", document.getElementById("auto_data").value);

            let response = await fetch("/admin/add-product", { method: "POST", body: formData });
            let res = await response.json();
            if(res.status === "success") {
                tg.showPopup({ title: 'Успех', message: 'Товар добавлен!', buttons: [{type: 'ok'}] });
                location.reload();
            }
        }
    </script>
</body>
</html>
